name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tests/calc-actual-pl.test.js
      - run: node tests/adj-clv.test.js
      - run: node tests/line-column.test.js
      - run: node tests/parse-bet.test.mjs
      - run: python3 -m unittest discover -s tests -p "*.py"
